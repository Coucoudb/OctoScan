name: CI (main)

on:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint (clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v5

      - name: Run Semgrep
        run: semgrep scan --config auto --config r/rust --sarif --output semgrep.sarif .

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

  build:
    name: Build (${{ matrix.os }})
    needs: [lint, audit, sast]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: octoscan-linux-amd64
            binary: target/release/octoscan
          - os: windows-latest
            artifact: octoscan-windows-amd64.exe
            binary: target/release/octoscan.exe
          - os: macos-latest
            artifact: octoscan-macos-arm64
            binary: target/release/octoscan
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Get version
        id: version
        run: echo "version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *\"//' | sed 's/\"//')" >> "$GITHUB_OUTPUT"

      - name: Download Linux artifact
        uses: actions/download-artifact@v5
        with:
          name: octoscan-linux-amd64
          path: artifacts/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: octoscan-windows-amd64.exe
          path: artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v5
        with:
          name: octoscan-macos-arm64
          path: artifacts/macos

      - name: Prepare release assets
        run: |
          chmod +x artifacts/linux/octoscan
          mv artifacts/linux/octoscan octoscan-linux-amd64
          mv artifacts/windows/octoscan.exe octoscan-windows-amd64.exe
          chmod +x artifacts/macos/octoscan
          mv artifacts/macos/octoscan octoscan-macos-arm64

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: OctoScan v${{ steps.version.outputs.version }}
          body: |
            ## OctoScan v${{ steps.version.outputs.version }}

            ### Downloads
            - **Linux (amd64):** `octoscan-linux-amd64`
            - **Windows (amd64):** `octoscan-windows-amd64.exe`
            - **macOS (arm64):** `octoscan-macos-arm64`
          files: |
            octoscan-linux-amd64
            octoscan-windows-amd64.exe
            octoscan-macos-arm64
          draft: false
          prerelease: false
          make_latest: true
